# ==========================================================
# MetricGuard - Docker Compose Configuration
# ==========================================================
#
# Purpose:
# Orchestrates all MetricGuard services:
#
# 1. monitoring → MetricGuard Agent
#    - Collects system metrics
#    - Monitors application logs
#    - Sends data to backend API
#
# 2. backend
#    - Receives metrics/logs
#    - Connects to MySQL / TiDB Cloud
#
# ==========================================================
#
# How to run:
#
# docker compose -f docker/docker-compose.yml up --build
#
# ==========================================================
#
# How to stop:
#
# docker compose -f docker/docker-compose.yml down
#
# ==========================================================
#
# View monitoring logs:
#
# docker-compose -f docker/docker-compose.yml logs -f monitoring
#
# ==========================================================


services:

  # ======================================================
  # Backend API Service
  # ======================================================

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend

    container_name: metricguard-backend

    restart: on-failure

    ports:
      - "8000:8000"

    env_file:
      - ../.env

    environment:
      PORT: 8000

    networks:
      - metricguard-network

  # ======================================================
  # Frontend Service (Vite + React)
  # ======================================================

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend

    container_name: metricguard-frontend

    restart: on-failure

    ports:
      - "5173:5173"

    depends_on:
      - backend

    networks:
      - metricguard-network

  # ======================================================
  # MetricGuard Agent Service
  # ======================================================
  #
  # Responsibilities:
  # - Collect system metrics
  # - Monitor watched log files
  # - Send metrics/logs to backend
  #
  # ======================================================

  monitoring:

    build:
      context: ..
      dockerfile: docker/Dockerfile.monitoring

    container_name: metricguard-agent

    restart: always

    environment:

      # --------------------------------------------------
      # Backend API
      # --------------------------------------------------

      BACKEND_URL: http://backend:8000/metrics
      LOGS_BACKEND_URL: http://backend:8000/logs

      # --------------------------------------------------
      # Collection / Retry Configuration
      # --------------------------------------------------

      COLLECTION_INTERVAL: 30
      MAX_RETRIES: 3
      RETRY_DELAY: 2
      REQUEST_TIMEOUT: 10

      # --------------------------------------------------
      # Logging
      # --------------------------------------------------

      LOG_LEVEL: INFO

      # --------------------------------------------------
      # Disk Monitoring
      # --------------------------------------------------

      DISK_PATH: /

    depends_on:
      - backend

    volumes:

      # Persist agent runtime logs
      - ../agent/logs:/app/logs

      # Persist watched log files
      - ../agent/watched_logs:/app/watched_logs

    networks:
      - metricguard-network

  # ======================================================
  # Demo Log/Metric Generator
  # ======================================================
  #
  # Responsibilities:
  # - Continuously generate demo logs and metrics
  # - Send data to backend API to populate dashboard
  #
  # ======================================================

  demo-generator:
    image: python:3.11-slim
    container_name: metricguard-demo-generator
    volumes:
      - ../scripts/demo_generator.py:/app/demo_generator.py
    command: sh -c "pip install requests && python /app/demo_generator.py"
    environment:
      - BACKEND_URL=http://backend:8000
      - CONTINUOUS_MODE=true
    depends_on:
      - backend
    networks:
      - metricguard-network

# ======================================================
# Shared Docker Network
# ======================================================
#
# Docker automatically provides internal DNS.
#
# Example:
# http://backend:8000
#
# ======================================================

networks:

  metricguard-network:
    driver: bridge
    name: metricguard-network

# ======================================================
# Persistent Docker Volumes
# ======================================================

volumes:

  # Agent runtime logs
  agent_logs:
    driver: local
